# version: contract revision; apiVersion: ODCS specification release
version: "1.0.0"
apiVersion: "v3.1.0"
kind: "DataContract"
id: "customer-events"
name: "Customer Events"
status: "draft"
description:
  purpose: Contract for customer event records.

team:
  name: "customer-platform"

support:
  - channel: "email"
    url: "mailto:data-team@example.com"

schema:
  - name: "customer_events"
    logicalType: "object"
    physicalName: "customer_events"
    properties:
      - name: "event_id"
        logicalType: "string"
        required: true
        description: Unique event identifier.
        logicalTypeOptions:
          format: "uuid"
      - name: "customer_id"
        logicalType: "string"
        required: true
        description: Customer identifier.
      - name: "event_timestamp"
        logicalType: "timestamp"
        required: true
        description: Event timestamp.
      - name: "event_type"
        logicalType: "string"
        required: true
        description: Event type.
        customProperties:
          - property: "enum"
            value:
              - created
              - updated
              - deleted
